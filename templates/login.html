<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima IAgro — Login</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#1a0033,#4a0070,#660099);
    min-height:100vh; display:flex;
    align-items:center; justify-content:center;
  }
  .card {
    background:white; border-radius:16px;
    padding:40px; width:100%; max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .logo { text-align:center; margin-bottom:28px; }
  .logo h1 { font-size:24px; color:#660099; font-weight:700; }
  .logo p  { font-size:12px; color:#999; margin-top:4px; }

  .tabs { display:flex; margin-bottom:24px; border-bottom:2px solid #f0e0ff; }
  .tab {
    flex:1; padding:10px; text-align:center;
    cursor:pointer; font-size:13px; font-weight:600;
    color:#999; border-bottom:3px solid transparent;
    margin-bottom:-2px; transition:all 0.2s;
  }
  .tab.ativo { color:#660099; border-bottom-color:#660099; }

  .form-group { margin-bottom:16px; }
  label { display:block; font-size:12px; font-weight:600; color:#555; margin-bottom:6px; }
  input {
    width:100%; padding:10px 14px; border-radius:8px;
    border:2px solid #e0d0f0; font-size:14px; outline:none;
    transition:border 0.2s;
  }
  input:focus { border-color:#660099; }

  .btn {
    width:100%; padding:12px;
    background:linear-gradient(135deg,#4a0070,#660099);
    color:white; border:none; border-radius:8px;
    font-size:15px; font-weight:600; cursor:pointer;
    transition:opacity 0.2s; margin-top:8px;
  }
  .btn:hover { opacity:0.9; }

  .msg-erro {
    background:#ffebee; color:#c62828;
    padding:10px 14px; border-radius:8px;
    font-size:13px; margin-bottom:16px;
    border-left:4px solid #c62828; display:none;
  }
  .msg-ok {
    background:#e8f5e9; color:#1b5e20;
    padding:10px 14px; border-radius:8px;
    font-size:13px; margin-bottom:16px;
    border-left:4px solid #388e3c; display:none;
  }

  .planos { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
  .plano-card {
    border:2px solid #e0d0f0; border-radius:8px;
    padding:8px; text-align:center; cursor:pointer;
    transition:all 0.2s; font-size:12px;
  }
  .plano-card.selecionado { border-color:#660099; background:#f9f0ff; }
  .plano-card .preco { font-size:13px; font-weight:700; color:#660099; margin-top:4px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="font-size:36px">🌾</div>
    <h1>Clima IAgro</h1>
    <p>Recomendações climáticas para o agronegócio</p>
  </div>

  <div class="tabs">
    <div class="tab ativo" onclick="mostrarAba('login')">Entrar</div>
    <div class="tab" onclick="mostrarAba('cadastro')">Criar conta</div>
  </div>

  <!-- LOGIN -->
  <div id="aba-login">
    <div id="erro-login" class="msg-erro"></div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••">
    </div>
    <button class="btn" onclick="fazerLogin()">Entrar</button>
  </div>

  <!-- CADASTRO -->
  <div id="aba-cadastro" style="display:none">
    <div id="erro-cadastro" class="msg-erro"></div>
    <div id="ok-cadastro" class="msg-ok"></div>
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="cad-nome" placeholder="João da Silva">
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="cad-email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="cad-senha" placeholder="mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label>Plano</label>
      <div class="planos">
        <div class="plano-card selecionado" onclick="selecionarPlano('basico', this)">
          Básico<br>3 fazendas
          <div class="preco">R$99/mês</div>
        </div>
        <div class="plano-card" onclick="selecionarPlano('pro', this)">
          Pro<br>10 fazendas
          <div class="preco">R$299/mês</div>
        </div>
        <div class="plano-card" onclick="selecionarPlano('enterprise', this)">
          Enterprise<br>Ilimitado
          <div class="preco">R$799/mês</div>
        </div>
      </div>
    </div>
    <button class="btn" onclick="fazerCadastro()">Criar conta grátis</button>
  </div>
</div>

<script>
  let planoSelecionado = 'basico';

  function mostrarAba(aba) {
    document.getElementById('aba-login').style.display    = aba === 'login'    ? 'block' : 'none';
    document.getElementById('aba-cadastro').style.display = aba === 'cadastro' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('ativo', (aba === 'login' && i === 0) || (aba === 'cadastro' && i === 1));
    });
  }

  function selecionarPlano(plano, el) {
    planoSelecionado = plano;
    document.querySelectorAll('.plano-card').forEach(c => c.classList.remove('selecionado'));
    el.classList.add('selecionado');
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value;
    const senha = document.getElementById('login-senha').value;
    const erro  = document.getElementById('erro-login');

    const res  = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, senha})
    });
    const data = await res.json();

    if (data.ok) {
      window.location.href = '/';
    } else {
      erro.textContent = data.erro;
      erro.style.display = 'block';
    }
  }

  async function fazerCadastro() {
    const nome  = document.getElementById('cad-nome').value;
    const email = document.getElementById('cad-email').value;
    const senha = document.getElementById('cad-senha').value;
    const erro  = document.getElementById('erro-cadastro');
    const ok    = document.getElementById('ok-cadastro');

    const res  = await fetch('/auth/cadastro', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({nome, email, senha, plano: planoSelecionado})
    });
    const data = await res.json();

    if (data.ok) {
      window.location.href = '/';
    } else {
      erro.textContent = data.erro;
      erro.style.display = 'block';
    }
  }
</script>
</body>
</html>
